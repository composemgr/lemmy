# nginx proxy address - http://172.17.0.1:8087

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  lemmy:
    image: dessalines/lemmy:latest
    container_name: lemmy-app
    restart: unless-stopped
    logging: *default-logging
    networks:
      - lemmy
    ports:
      - "8087:8536"
    environment:
      TZ: ${TZ:-America/New_York}
    volumes:
      - ./rootfs/data/lemmy:/data
      - ./rootfs/config/lemmy:/config
    depends_on:
      - lemmy-db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8536"]
      interval: 30s
      timeout: 10s
      retries: 3

  lemmy-db:
    image: postgres:16-alpine
    container_name: lemmy-db
    restart: unless-stopped
    logging: *default-logging
    networks:
      - lemmy
    environment:
      TZ: ${TZ:-America/New_York}
      POSTGRES_DB: ${DB_CREATE_DATABASE_NAME:-lemmy}
      POSTGRES_USER: ${DB_USER_NAME:-lemmy}
      POSTGRES_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
    volumes:
      - ./rootfs/data/db/postgres/lemmy:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  lemmy:
    external: false
